<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Campus - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

    <div class="glass-card p-5 text-center" style="width: 100%; max-width: 450px;">
        <h2 id="formTitle" class="serif-title mb-2">Student Login</h2>
        <p class="text-muted mb-4">Smart Campus Access Gateway</p>
        
        <div id="registerFields" style="display: none;">
            <div class="mb-3 text-start">
                <label class="form-label small fw-bold" style="color: var(--accent-berry)">Full Name</label>
                <input type="text" id="nameInput" class="form-control custom-input" placeholder="Enter your full name">
            </div>
            <div class="mb-3 text-start">
                <label class="form-label small fw-bold" style="color: var(--accent-berry)">Matric Number</label>
                <input type="text" id="matricInput" class="form-control custom-input" placeholder="e.g., S12345">
            </div>
        </div>

        <div class="mb-3 text-start">
            <label class="form-label small fw-bold" style="color: var(--accent-berry)">Email Address</label>
            <input type="email" id="emailInput" class="form-control custom-input" placeholder="student@ocean.umt.edu.my">
        </div>
        <div class="mb-4 text-start">
            <label class="form-label small fw-bold" style="color: var(--accent-berry)">Password</label>
            <input type="password" id="passwordInput" class="form-control custom-input" placeholder="Enter your password">
        </div>
        
        <button id="mainBtn" onclick="processSubmit()" class="btn-pink w-100 mb-3">Login to Dashboard</button>
        
        <p class="small text-muted mb-0">
            <span id="toggleText">Don't have an account?</span> 
            <a href="#" onclick="toggleMode()" style="color: var(--deep-rose); font-weight: bold; text-decoration: none;">
                <span id="toggleLink">Register here</span>
            </a>
        </p>

        <div id="alertBox" class="mt-3 small font-weight-bold"></div>
    </div>

    <script>
        let isLoginMode = true; // System starts in Login mode by default

        window.onload = () => {
            if(localStorage.getItem('campusUser')) {
                window.location.href = '/dashboard.html';
            }
        };

        // This function flips the UI between Login and Register
        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('registerFields').style.display = isLoginMode ? 'none' : 'block';
            document.getElementById('formTitle').innerText = isLoginMode ? 'Student Login' : 'Create Account';
            document.getElementById('mainBtn').innerText = isLoginMode ? 'Login to Dashboard' : 'Complete Registration';
            document.getElementById('toggleText').innerText = isLoginMode ? "Don't have an account?" : "Already registered?";
            document.getElementById('toggleLink').innerText = isLoginMode ? "Register here" : "Login here";
            document.getElementById('alertBox').innerText = ""; // Clear errors on toggle
        }

        // Determines which route to trigger based on the current UI mode
        function processSubmit() {
            if (isLoginMode) {
                login();
            } else {
                register();
            }
        }

        async function register() {
            const name = document.getElementById('nameInput').value.trim();
            const email = document.getElementById('emailInput').value.trim();
            const matricNo = document.getElementById('matricInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            
            if (!name || !email || !matricNo || !password) return alert("Please fill in all fields to register.");

            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, matricNo, password })
            });
            const data = await res.json();
            
            const alertBox = document.getElementById('alertBox');
            if(res.ok) {
                alertBox.className = "mt-3 text-success";
                alertBox.innerText = "Success! Switching to login...";
                setTimeout(toggleMode, 1500); // Send them to login screen after 1.5s
            } else {
                alertBox.className = "mt-3 text-danger";
                alertBox.innerText = data.error || "Registration failed.";
            }
        }

        async function login() {
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            
            if (!email || !password) return alert("Email and Password are required.");

            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            
            if(res.ok) {
                localStorage.setItem('campusUser', JSON.stringify(data.user));
                window.location.href = '/dashboard.html'; 
            } else {
                document.getElementById('alertBox').className = "mt-3 text-danger";
                document.getElementById('alertBox').innerText = data.error || "Login failed.";
            }
        }
    </script>
</body>
</html>
