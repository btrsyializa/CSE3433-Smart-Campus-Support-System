<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Campus - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <div class="glass-card p-5 text-center" style="width: 100%; max-width: 700px;">
        <h2 class="serif-title mb-1">Welcome, <span id="studentName"></span>!</h2>
        <p class="text-muted mb-5">Matric No: <span id="studentMatric" class="fw-bold" style="color: var(--dark-charcoal)"></span> | Smart Campus Portal</p>

        <div class="row g-4">
            <div class="col-md-6">
                <div onclick="navigateWithSession(3001)" class="service-card" style="cursor: pointer;">
                    <div class="service-icon"></div>
                    <h5 class="fw-bold" style="color: var(--accent-berry)">System Anomaly</h5>
                    <p class="small text-muted mb-0">Report broken facilities or IT issues directly to maintenance.</p>
                </div>
            </div>
            
            <div class="col-md-6">
                <div onclick="navigateWithSession(3002)" class="service-card" style="cursor: pointer;">
                    <div class="service-icon"></div>
                    <h5 class="fw-bold" style="color: var(--accent-berry)">Facility Booking</h5>
                    <p class="small text-muted mb-0">Reserve labs, sports courts, and meeting rooms.</p>
                </div>
            </div>
        </div>
        
        <div class="mt-5 pt-3 border-top" style="border-color: var(--pastel-pink) !important;">
            <button onclick="logout()" class="btn btn-sm btn-outline-secondary" style="border-radius: 10px;">Disconnect Session</button>
        </div>
    </div>

    <script>
        // Security Check: Ensure user is actually logged in
        window.onload = () => {
            const userData = localStorage.getItem('campusUser');
            if(!userData) {
                window.location.href = '/'; 
            } else {
                const user = JSON.parse(userData);
                document.getElementById('studentName').innerText = user.name;
                if(user.matricNo) {
                    document.getElementById('studentMatric').innerText = user.matricNo;
                }
            }
        };

        // NEW: This function encrypts the token and attaches it to the URL
        function navigateWithSession(port) {
            const userData = localStorage.getItem('campusUser');
            if (userData) {
                // btoa() converts the user data into a safe Base64 token
                const token = btoa(userData);
                window.location.href = `http://localhost:${port}/?session=${token}`;
            } else {
                logout();
            }
        }

        function logout() {
            localStorage.removeItem('campusUser');
            window.location.href = '/'; 
        }
    </script>
</body>
</html>
