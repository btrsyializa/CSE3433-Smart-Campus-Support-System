<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Campus - Control Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <style>
        .service-card {
            border: 1px solid var(--pastel-pink);
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .service-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 117, 140, 0.15);
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);">

    <div class="glass-card p-5 text-center" style="width: 100%; max-width: 700px; background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(15px); border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);">
        <h2 class="serif-title mb-1">Welcome, <span id="studentName">User</span>!</h2>
        <p class="text-muted mb-5" id="contextSubtitle">Smart Campus Management Portal</p>

        <div id="studentPanel" class="row g-4" style="display: none;">
            <div class="col-md-6">
                <div onclick="navigateWithSession(3001)" class="service-card h-100" style="cursor: pointer;">
                    <h5 class="fw-bold" style="color: var(--accent-berry)">System Anomaly</h5>
                    <p class="small text-muted mb-0">Report broken facilities or IT bugs.</p>
                </div>
            </div>
            <div class="col-md-6">
                <div onclick="navigateWithSession(3002)" class="service-card h-100" style="cursor: pointer;">
                    <h5 class="fw-bold" style="color: var(--accent-berry)">Facility Booking</h5>
                    <p class="small text-muted mb-0">Reserve laboratories and lecture halls.</p>
                </div>
            </div>
        </div>

        <div id="adminPanel" class="row g-4" style="display: none;">
            <div class="col-md-12">
                <div onclick="navigateWithSession(3001)" class="service-card" style="cursor: pointer; border-color: #ffc107; background: linear-gradient(135deg, #fffdf5 0%, #fff8d6 100%);">
                    <h5 class="fw-bold text-warning">Admin Override Panel</h5>
                    <p class="small text-muted mb-0">Evaluate student fault requests and administer systems cluster.</p>
                </div>
            </div>
        </div>
        
        <div class="mt-5 pt-3 border-top" style="border-color: var(--pastel-pink) !important;">
            <button onclick="logout()" class="btn btn-sm btn-outline-secondary px-4" style="border-radius: 10px;">Disconnect Session</button>
        </div>
    </div>

    <script>
        // --- Cloud Service Registry Endpoints ---
        const AUTH_URL = 'https://cse3433-smart-campus-support-system-1.onrender.com';
        const FACILITY_URL = 'https://cse3433-smart-campus-support-system.onrender.com';
        const REQUEST_URL = 'https://cse3433-smart-campus-support-system-yejt.onrender.com';
        
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const queryToken = urlParams.get('session');

            if (queryToken) {
                try {
                    const decodedUser = atob(queryToken);
                    localStorage.setItem('campusUser', decodedUser);
                } catch (err) {
                    window.location.href = AUTH_URL;
                    return;
                }
                window.history.replaceState({}, document.title, "/dashboard.html");
            }

            const userData = localStorage.getItem('campusUser');
            if(!userData) {
                window.location.href = AUTH_URL; 
            } else {
                try {
                    const user = JSON.parse(userData);
                    document.getElementById('studentName').innerText = user.name;
                    
                    const titleTarget = document.getElementById('contextSubtitle');
                    if(user.role === 'admin') {
                        titleTarget.innerHTML = `<span class="badge bg-danger p-2 px-3 shadow-sm" style="border-radius:10px;">CLEARANCE: ADMINISTRATIVE OVERRIDE</span>`;
                        document.getElementById('adminPanel').style.display = 'flex';
                    } else {
                        const matric = (user.matricNo && user.matricNo !== 'N/A') ? user.matricNo : 'Verified Student';
                        titleTarget.innerHTML = `Matric No: <span class="fw-bold text-dark">${matric}</span> | Smart Campus Portal`;
                        document.getElementById('studentPanel').style.display = 'flex';
                    }
                } catch(e) {
                    logout();
                }
            }
        };

        // --- SOA Cloud Redirection Engine ---
        function navigateWithSession(port) {
            const userData = localStorage.getItem('campusUser');
            if (userData) {
                const token = btoa(userData);
                
                if (port === 3001) {
                    // Routes to Request Service Cloud URL
                    const user = JSON.parse(userData);
                    const page = (user.role === 'admin') ? 'admin.html' : 'dashboard.html';
                    window.location.href = `${REQUEST_URL}/${page}?session=${token}`;
                } else if (port === 3002) {
                    // Routes to Facility Service Cloud URL
                    window.location.href = `${FACILITY_URL}/booking.html?session=${token}`;
                }
            } else {
                logout();
            }
        }

        function logout() {
            localStorage.removeItem('campusUser');
            window.location.href = AUTH_URL; 
        }
    </script>
</body>
</html>
