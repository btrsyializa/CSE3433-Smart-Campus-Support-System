version: '3.8'

services:
  # Auth Service - Port 3000
  auth-service:
    build: ./auth-service
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/campusdb
      - PORT=3000
      - NODE_ENV=production
    networks:
      - campus-network
    healthcheck:
      test: curl -f http://localhost:3000 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  # Request Service - Port 3001
  request-service:
    build: ./request-service
    ports:
      - "3001:3001"
    depends_on:
      - mongo
      - facility-service
    environment:
      - MONGO_URI=mongodb://mongo:27017/campusdb
      - PORT=3001
      - FACILITY_SERVICE_URL=http://facility-service:3002
      - NODE_ENV=production
    networks:
      - campus-network
    healthcheck:
      test: curl -f http://localhost:3001 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  # Facility Service - Port 3002
  facility-service:
    build: ./facility-service
    ports:
      - "3002:3002"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/campusdb
      - PORT=3002
      - NODE_ENV=production
    networks:
      - campus-network
    healthcheck:
      test: curl -f http://localhost:3002 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB Database
  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=campusdb
    networks:
      - campus-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  campus-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local