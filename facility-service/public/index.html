<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facility Booking Service</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cream-bg: #fff5f6; --pastel-pink: #ffd3da;
            --deep-rose: #ff758c; --accent-berry: #c04856;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, var(--cream-bg) 0%, #fff0f2 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 24px;
            box-shadow: 0 4px 12px rgba(255, 175, 189, 0.15);
            border: 1px solid rgba(255,255,255,0.6);
        }
        .btn-pink {
            background: linear-gradient(135deg, var(--deep-rose) 0%, #ff5e7e 100%);
            color: white; border-radius: 14px; border: none;
        }
    </style>
</head>
<body class="p-4">

    <nav class="navbar glass-card mb-4 px-4 py-3 d-flex justify-content-between">
        <h4 class="mb-0" style="color: var(--accent-berry); font-family: 'Playfair Display', serif;">Facility Booking Core</h4>
        <div>
            <span class="me-3">User: <strong id="navUserName">Loading...</strong></span>
            <button onclick="window.location.href='http://localhost:3000/dashboard.html'" class="btn btn-sm btn-outline-secondary">Return to Hub</button>
        </div>
    </nav>

    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="glass-card p-4">
                <h5 style="color: var(--accent-berry)">New Reservation</h5>
                <select id="facSelect" class="form-select mb-3">
                    <option value="Makmal Pengaturcaraan 1">Makmal Pengaturcaraan 1</option>
                    <option value="Makmal Pengaturcaraan 2">Makmal Pengaturcaraan 2</option>
                    <option value="Makmal CISCO">Makmal CISCO</option>
                    <option value="Auditorium Mahyuddin">Auditorium Mahyuddin</option>
                </select>
                <input type="date" id="dateSelect" class="form-control mb-3">
                <select id="timeSelect" class="form-select mb-3">
                    <option value="08:00 AM - 10:00 AM">08:00 AM - 11:00 AM</option>
                    <option value="10:00 AM - 12:00 PM">11:00 AM - 2:00 PM</option>
                    <option value="02:00 PM - 04:00 PM">02:00 PM - 05:00 PM</option>
                </select>
                <button onclick="submitBooking()" class="btn-pink w-100 py-2">Confirm Booking</button>
            </div>
        </div>

        <div class="col-md-8">
            <div class="glass-card p-4">
                <h5 style="color: var(--accent-berry)">Live Booking Ledger</h5>
                <ul id="bookingList" class="list-group mt-3"></ul>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;

        // SSO Guard
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('session');
            if (token) {
                localStorage.setItem('campusUser', atob(token));
                window.history.replaceState({}, document.title, "/");
            }
            const userData = localStorage.getItem('campusUser');
            if (!userData) {
                alert("Unauthorized. Returning to Hub.");
                window.location.href = 'http://localhost:3000';
            } else {
                currentUser = JSON.parse(userData);
                document.getElementById('navUserName').innerText = currentUser.name;
                fetchBookings();
            }
        };

        async function fetchBookings() {
            const res = await fetch('/api/bookings');
            const data = await res.json();
            document.getElementById('bookingList').innerHTML = data.map(b => 
                `<li class="list-group-item d-flex justify-content-between mb-2 shadow-sm rounded">
                    <div><strong>${b.facilityName}</strong><br><small class="text-muted">${b.date} | ${b.timeSlot}</small></div>
                    <div class="text-end"><small>Reserved by: ${b.studentName}</small><br><span class="badge bg-success">${b.status}</span></div>
                </li>`
            ).join('');
        }

        async function submitBooking() {
            const payload = {
                facilityName: document.getElementById('facSelect').value,
                date: document.getElementById('dateSelect').value,
                timeSlot: document.getElementById('timeSelect').value,
                studentName: currentUser.name,
                matricNo: currentUser.matricNo
            };

            if(!payload.date) return alert("Please select a date!");

            const res = await fetch('/api/bookings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            
            if(res.ok) fetchBookings();
            else alert("Error: " + data.error);
        }
    </script>
</body>
</html>
