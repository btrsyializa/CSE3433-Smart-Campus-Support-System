<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Campus - Request Service</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <div id="appContainer">
        <nav class="navbar navbar-expand-lg glass-card m-3 px-4 py-3">
            <div class="container-fluid">
                <span class="navbar-brand navbar-brand-aesthetic"> Smart Campus Support System </span>
                <div class="d-flex align-items-center">
                    <span class="badge bg-white text-dark border p-2 me-3" style="border-radius: 10px;">
                        User: <strong id="navUserName">Loading...</strong>
                    </span>
                    <button onclick="returnToHub()" class="btn btn-sm btn-outline-secondary" style="border-radius: 10px;">Return to Hub</button>
                </div>
            </div>
        </nav>

        <div class="container-fluid px-4 mt-4">
            <div class="row">
                
                <div class="col-lg-4 mb-4">
                    <div class="glass-card p-4">
                        <h4 class="serif-title mb-3">Report System Anomaly</h4>
                        <p class="text-muted small mb-4">Initialize tracking documents inside the decentralized data manager cluster.</p>
                        
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Anomaly Category/Title</label>
                            <input type="text" id="titleInput" class="form-control custom-input" placeholder="e.g., Broken AC / Unresponsive Projector">
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Campus Core Location</label>
                            <input type="text" id="locationInput" class="form-control custom-input" placeholder="e.g., MP1 / BS7">
                        </div>
                        
                        <button onclick="dispatchRequestPost()" class="btn-pink w-100 py-3">
                            Commit Entry Document
                        </button>
                    </div>
                </div>

                <div class="col-lg-8 mb-4">
                    <div class="glass-card p-4">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div>
                                <h4 class="serif-title mb-0">Decentralized Stream Monitor</h4>
                                <p class="text-muted small mb-0">Real-time validation array query tracking</p>
                            </div>
                            <button onclick="fetchRemoteStreamArray()" class="btn btn-sm btn-outline-secondary px-3" style="border-radius: 10px;">
                                Force Poll Cluster
                            </button>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6 mb-2">
                                <div class="stat-banner">
                                    <div class="small text-muted fw-bold text-uppercase">Total Stream Requests</div>
                                    <div id="metricTotal" class="stat-number">0</div>
                                </div>
                            </div>
                            <div class="col-md-6 mb-2">
                                <div class="stat-banner">
                                    <div class="small text-muted fw-bold text-uppercase">Pending Evaluation</div>
                                    <div id="metricPending" class="stat-number">0</div>
                                </div>
                            </div>
                        </div>

                        <div style="max-height: 480px; overflow-y: auto; padding-right: 5px;">
                            <ul id="streamRenderingTarget" class="list-group list-group-flush">
                                </ul>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
