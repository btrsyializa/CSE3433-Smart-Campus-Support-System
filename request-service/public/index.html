<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Campus - Request Service</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cream-bg: #fff5f6;
            --pastel-pink: #ffd3da;
            --mid-pink: #ffafbd;
            --deep-rose: #ff758c;
            --accent-berry: #c04856;
            --dark-charcoal: #2b2526;
            --shadow-sm: 0 4px 12px rgba(255, 175, 189, 0.15);
            --shadow-md: 0 10px 30px rgba(255, 175, 189, 0.25);
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, var(--cream-bg) 0%, #fff0f2 100%);
            color: var(--dark-charcoal);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .serif-title {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            color: var(--accent-berry);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            box-shadow: var(--shadow-sm);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .custom-input {
            border: 2px solid var(--pastel-pink);
            border-radius: 14px;
            padding: 12px 16px;
            background-color: rgba(255, 255, 255, 0.9);
            transition: all 0.3s ease;
        }
        .custom-input:focus {
            border-color: var(--deep-rose);
            box-shadow: 0 0 0 4px rgba(255, 117, 140, 0.15);
            background-color: #fff;
            outline: none;
        }
        .btn-pink {
            background: linear-gradient(135deg, var(--deep-rose) 0%, #ff5e7e 100%);
            color: white;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            padding: 12px 24px;
            box-shadow: 0 4px 15px rgba(255, 117, 140, 0.3);
            transition: all 0.3s ease;
        }
        .btn-pink:hover {
            background: linear-gradient(135deg, #ff5e7e 0%, var(--deep-rose) 100%);
            color: white;
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(255, 117, 140, 0.45);
        }
        .badge-pending {
            background-color: #ffe5eb;
            color: #d03a52;
            border: 1px solid #ffccd7;
            padding: 6px 12px;
            border-radius: 10px;
            font-weight: 600;
        }
        .navbar-brand-aesthetic {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: var(--accent-berry) !important;
            font-size: 1.4rem;
        }
        .request-item {
            border-left: 5px solid var(--deep-rose) !important;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 14px;
            margin-bottom: 12px;
            border: 1px solid rgba(0,0,0,0.03);
        }
        .stat-banner {
            background: linear-gradient(135deg, #fff0f2 0%, var(--cream-bg) 100%);
            border: 2px dashed var(--pastel-pink);
            border-radius: 18px;
            padding: 20px;
            text-align: center;
        }
        .stat-number {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--accent-berry);
        }
    </style>
</head>
<body>

    <div id="appContainer">
        <nav class="navbar navbar-expand-lg glass-card m-3 px-4 py-3">
            <div class="container-fluid">
                <span class="navbar-brand navbar-brand-aesthetic"> Smart Campus Support System </span>
                <div class="d-flex align-items-center">
                    <span class="badge bg-white text-dark border p-2 me-3" style="border-radius: 10px;">
                        User: <strong id="navUserName">Loading...</strong>
                    </span>
                    <button onclick="returnToHub()" class="btn btn-sm btn-outline-secondary" style="border-radius: 10px;">Return to Hub</button>
                </div>
            </div>
        </nav>

        <div class="container-fluid px-4 mt-4">
            <div class="row">
                
                <div class="col-lg-4 mb-4">
                    <div class="glass-card p-4">
                        <h4 class="serif-title mb-3">Report System Anomaly</h4>
                        <p class="text-muted small mb-4">Initialize tracking documents inside the decentralized data manager cluster.</p>
                        
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Anomaly Category/Title</label>
                            <input type="text" id="titleInput" class="form-control custom-input" placeholder="e.g., Broken AC / Unresponsive Projector">
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Campus Core Location</label>
                            <input type="text" id="locationInput" class="form-control custom-input" placeholder="e.g., MP1 / BS7">
                        </div>
                        
                        <button onclick="dispatchRequestPost()" class="btn-pink w-100 py-3">
                            Commit Entry Document
                        </button>
                    </div>
                </div>

                <div class="col-lg-8 mb-4">
                    <div class="glass-card p-4">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div>
                                <h4 class="serif-title mb-0">Decentralized Stream Monitor</h4>
                                <p class="text-muted small mb-0">Real-time validation array query tracking</p>
                            </div>
                            <button onclick="fetchRemoteStreamArray()" class="btn btn-sm btn-outline-secondary px-3" style="border-radius: 10px;">
                                Force Poll Cluster
                            </button>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6 mb-2">
                                <div class="stat-banner">
                                    <div class="small text-muted fw-bold text-uppercase">Total Stream Requests</div>
                                    <div id="metricTotal" class="stat-number">0</div>
                                </div>
                            </div>
                            <div class="col-md-6 mb-2">
                                <div class="stat-banner">
                                    <div class="small text-muted fw-bold text-uppercase">Pending Evaluation</div>
                                    <div id="metricPending" class="stat-number">0</div>
                                </div>
                            </div>
                        </div>

                        <div style="max-height: 480px; overflow-y: auto; padding-right: 5px;">
                            <ul id="streamRenderingTarget" class="list-group list-group-flush">
                                </ul>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // --- SOA Authentication Guard ---
        window.onload = () => {
            // 1. Check if the Auth Gateway sent us a session ticket in the URL
            const urlParams = new URLSearchParams(window.location.search);
            const sessionToken = urlParams.get('session');

            if (sessionToken) {
                // Decode the ticket and save it to Port 3001's local vault!
                const decodedUser = atob(sessionToken);
                localStorage.setItem('campusUser', decodedUser);
                
                // Clean up the URL so it looks nice and clean in the browser
                window.history.replaceState({}, document.title, "/");
            }

            // 2. Read the secure token from local storage
            const userData = localStorage.getItem('campusUser');
            
            if (!userData) {
                // If no token is found, kick them back to Port 3000 immediately
                alert("Unauthorized Access. Redirecting to Gateway...");
                window.location.href = 'http://localhost:3000';
            } else {
                // Parse identity and personalize the dashboard
                const user = JSON.parse(userData);
                document.getElementById('navUserName').innerText = user.name;
                
                // Load data only after confirming identity
                fetchRemoteStreamArray(); 
            }
        };

        function returnToHub() {
            // Sends the user back to the central port 3000 dashboard
            window.location.href = 'http://localhost:3000/dashboard.html';
        }

        // --- Network Layer: Query Array Fetch Operations ---
        async function fetchRemoteStreamArray() {
            const targetUl = document.getElementById('streamRenderingTarget');
            try {
                const response = await fetch('/requests');
                if (!response.ok) throw new Error(`HTTP network error code: ${response.status}`);
                
                const dataArray = await response.json();
                
                document.getElementById('metricTotal').textContent = dataArray.length;
                const pendingCount = dataArray.filter(item => item.status === 'Pending').length;
                document.getElementById('metricPending').textContent = pendingCount;

                if (dataArray.length === 0) {
                    targetUl.innerHTML = `
                        <div class="text-center py-5">
                            <p class="text-muted small">No cluster documents compiled inside requests collection tier.</p>
                        </div>`;
                    return;
                }

                targetUl.innerHTML = dataArray.map(doc => `
                    <li class="list-group-item request-item d-flex justify-content-between align-items-center p-3 shadow-sm border-0">
                        <div>
                            <h6 class="mb-1 fw-bold text-dark">${escapeOutput(doc.title)}</h6>
                            <p class="mb-0 text-muted small">
                                <span class="me-2"> Location: <strong>${escapeOutput(doc.location)}</strong></span>
                                <span class="text-xs">ID: ${doc._id}</span>
                            </p>
                        </div>
                        <div>
                            <span class="badge-pending">${doc.status || 'Pending'}</span>
                        </div>
                    </li>
                `).reverse().join('');

            } catch (err) {
                console.error("Critical stream monitoring mapping error encountered:", err);
                targetUl.innerHTML = `<div class="alert alert-danger p-3 small">Cluster query failed: ${err.message}</div>`;
            }
        }

        // --- Network Layer: Mutation Object Post Dispatch Operations ---
        async function dispatchRequestPost() {
            const titleElement = document.getElementById('titleInput');
            const locationElement = document.getElementById('locationInput');
            
            const titleValue = titleElement.value.trim();
            const locationValue = locationElement.value.trim();

            if (!titleValue || !locationValue) {
                alert("Validation Halt: Input parameters must not contain empty strings.");
                return;
            }

            try {
                const response = await fetch('/requests', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: titleValue, location: locationValue })
                });

                if (!response.ok) {
                    const rawErrorResponse = await response.json().catch(() => ({}));
                    throw new Error(`Server tracking update dropped: ${rawErrorResponse.error || response.status}`);
                }

                titleElement.value = '';
                locationElement.value = '';
                
                await fetchRemoteStreamArray();

            } catch (error) {
                console.error("Mutation dispatch error processed:", error);
                alert(`Operation Halt - ${error.message}`);
            }
        }

        function escapeOutput(str) {
            if (!str) return '';
            return str.replace(/&/g, "&amp;")
                      .replace(/</g, "&lt;")
                      .replace(/>/g, "&gt;")
                      .replace(/"/g, "&quot;")
                      .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
