<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Campus - Request Service</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="appContainer">
        <nav class="navbar navbar-expand-lg glass-card m-3 px-4 py-3">
            <div class="container-fluid">
                <span class="navbar-brand navbar-brand-aesthetic"> Smart Campus Support System </span>
                <div class="d-flex align-items-center">
                    <span class="badge bg-white text-dark border p-2 me-3" style="border-radius: 10px;">
                        User: <strong id="navUserName">Loading...</strong>
                    </span>
                    <button onclick="returnToHub()" class="btn btn-sm btn-outline-secondary" style="border-radius: 10px;">Return to Hub</button>
                </div>
            </div>
        </nav>

        <div class="container-fluid px-4 mt-4">
            <div class="row">
                <div class="col-lg-4 mb-4">
                    <div class="glass-card p-4">
                        <h4 class="serif-title mb-3">Report System Anomaly</h4>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Anomaly Category/Title</label>
                            <input type="text" id="titleInput" class="form-control custom-input" placeholder="e.g., Broken AC">
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Campus Core Location</label>
                            <input type="text" id="locationInput" class="form-control custom-input" placeholder="e.g., MP1">
                        </div>
                        <button onclick="dispatchRequestPost()" class="btn-pink w-100 py-3">Commit Entry Document</button>
                    </div>
                </div>
                <div class="col-lg-8 mb-4">
                    <div class="glass-card p-4">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h4 class="serif-title mb-0">Decentralized Stream Monitor</h4>
                            <button onclick="fetchRemoteStreamArray()" class="btn btn-sm btn-outline-secondary px-3">Force Poll</button>
                        </div>
                        <ul id="streamRenderingTarget" class="list-group list-group-flush"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const AUTH_URL = 'https://cse3433-smart-campus-support-system-1.onrender.com';
        const REQUEST_URL = 'https://cse3433-smart-campus-support-system-yejt.onrender.com';

        let currentUser = null;

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const sessionToken = urlParams.get('session');
            if (sessionToken) {
                localStorage.setItem('campusUser', atob(sessionToken));
                window.history.replaceState({}, document.title, "/dashboard.html");
            }
            const userData = localStorage.getItem('campusUser');
            if (!userData) {
                window.location.href = AUTH_URL;
            } else {
                currentUser = JSON.parse(userData);
                document.getElementById('navUserName').innerText = currentUser.name;
                fetchRemoteStreamArray();
            }
        };

        function returnToHub() { window.location.href = `${AUTH_URL}/dashboard.html`; }

        async function fetchRemoteStreamArray() {
            const targetUl = document.getElementById('streamRenderingTarget');
            try {
                const response = await fetch(`${REQUEST_URL}/api/requests`);
                const dataArray = await response.json();
                targetUl.innerHTML = dataArray.map(doc => `
                    <li class="list-group-item mb-2 shadow-sm border-0">
                        <div class="d-flex justify-content-between">
                            <div><h6 class="fw-bold">${doc.title}</h6><small>${doc.location}</small></div>
                            <span class="badge ${doc.status === 'Resolved' ? 'bg-success' : 'bg-warning'}">${doc.status}</span>
                        </div>
                    </li>
                `).join('');
            } catch (err) { console.error("Fetch Error:", err); }
        }

        async function dispatchRequestPost() {
            const title = document.getElementById('titleInput').value;
            const location = document.getElementById('locationInput').value;
            await fetch(`${REQUEST_URL}/api/requests`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, location })
            });
            fetchRemoteStreamArray();
        }
    </script>
</body>
</html>
